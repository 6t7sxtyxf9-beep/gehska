<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GenBurys</title>

  <!-- MOBILE OPTIMIZATION -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <meta name="theme-color" content="#ff7a1a" />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }

    html{
      width:100%;
      height:100%;
      overflow-x:hidden;
    }

    :root{
      --bg:#0a0a0a;
      --card:#111111;
      --card2:#181818;
      --orange:#ff7a1a;
      --orange-dark:#d95f00;
      --text:#f2f2f2;
      --sub:#8c8c8c;
      --border:#242424;
    }

    body{
      font-family: Inter, Arial, sans-serif;

      background:
      radial-gradient(circle at top left, rgba(255,122,26,0.12), transparent 25%),
      radial-gradient(circle at bottom right, rgba(255,122,26,0.08), transparent 30%),
      var(--bg);

      color:var(--text);

      min-height:100vh;
      width:100%;

      display:flex;
      justify-content:center;
      align-items:center;

      padding:18px;

      overflow-x:hidden;

      animation:fadeIn 1s ease;

      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(15px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    @keyframes pulseGlow{
      0%{
        box-shadow:0 0 0 rgba(255,122,26,0);
      }
      50%{
        box-shadow:0 0 25px rgba(255,122,26,0.18);
      }
      100%{
        box-shadow:0 0 0 rgba(255,122,26,0);
      }
    }

    .container{
      width:100%;
      max-width:520px;

      background:
      linear-gradient(145deg,var(--card),var(--card2));

      border:1px solid var(--border);

      border-radius:28px;

      padding:30px;

      animation:fadeIn 1s ease;
      animation-fill-mode:forwards;
      animation-delay:.15s;

      opacity:0;

      backdrop-filter:blur(12px);

      box-shadow:
      0 20px 50px rgba(0,0,0,0.45);

      overflow:hidden;
    }

    .logo{
      text-align:center;

      margin-bottom:10px;

      font-size:2.7rem;
      font-weight:800;

      letter-spacing:1px;

      color:var(--orange);

      animation:pulseGlow 4s infinite;

      word-break:break-word;
    }

    .subtitle{
      text-align:center;
      color:var(--sub);

      margin-bottom:30px;

      font-size:.95rem;
      line-height:1.5;
    }

    .input-group{
      margin-bottom:18px;
      width:100%;
    }

    label{
      display:block;
      margin-bottom:8px;

      color:var(--sub);

      font-size:.9rem;
    }

    input{
      width:100%;

      padding:16px;

      border-radius:18px;

      border:1px solid var(--border);

      background:#0d0d0d;

      color:var(--text);

      outline:none;

      transition:.25s;

      font-size:1rem;

      appearance:none;
      -webkit-appearance:none;
    }

    input:focus{
      border-color:var(--orange);

      box-shadow:
      0 0 0 4px rgba(255,122,26,0.12);
    }

    .button-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;

      margin-top:15px;
      width:100%;
    }

    button{
      border:none;
      cursor:pointer;

      transition:.25s;

      border-radius:18px;

      font-weight:700;
      font-size:.96rem;

      min-height:54px;

      touch-action:manipulation;
    }

    button:active{
      transform:scale(.98);
    }

    .price-button{
      background:
      linear-gradient(
        145deg,
        var(--orange),
        var(--orange-dark)
      );

      color:white;

      padding:16px;
    }

    .price-button:hover{
      transform:translateY(-2px) scale(1.02);
      filter:brightness(1.08);
    }

    .secondary-btn{
      width:100%;

      margin-top:12px;

      padding:16px;

      background:#151515;

      color:var(--text);

      border:1px solid var(--border);
    }

    .secondary-btn:hover{
      border-color:var(--orange);
      color:var(--orange);
    }

    #customPriceContainer{
      display:none;
      animation:fadeIn .4s ease;
      width:100%;
    }

    .barcode-frame{
      background:white;

      border-radius:24px;

      padding:20px;

      margin-top:28px;

      animation:fadeIn .8s ease;

      overflow-x:auto;
      width:100%;
    }

    canvas{
      width:100% !important;
      max-width:100%;
      height:auto !important;
      display:block;
    }

    .watermark{
      text-align:center;

      color:#666;

      font-size:.75rem;

      margin-top:8px;
    }

    .toggle-wrap{
      margin-top:18px;
      width:100%;
    }

    .dark-mode-toggle{
      width:100%;

      padding:15px;

      background:#121212;

      color:var(--orange);

      border:1px solid var(--border);
    }

    .dark-mode-toggle:hover{
      background:#1b1b1b;
    }

    /* PASSWORD SCREEN */

    #lockScreen{
      position:fixed;
      inset:0;

      background:#050505;

      display:flex;
      justify-content:center;
      align-items:center;

      z-index:999;

      animation:fadeIn .5s ease;

      padding:20px;
    }

    .lock-box{
      width:100%;
      max-width:400px;

      background:#111;

      border:1px solid #222;

      border-radius:24px;

      padding:30px;

      text-align:center;

      box-shadow:
      0 15px 40px rgba(0,0,0,.55);
    }

    .lock-title{
      font-size:2rem;

      color:var(--orange);

      font-weight:800;

      margin-bottom:10px;
    }

    .lock-sub{
      color:#777;
      margin-bottom:20px;
      line-height:1.5;
    }

    .error{
      color:#ff4d4d;

      margin-top:12px;

      display:none;

      font-size:.9rem;
    }

    /* TABLET */

    @media(max-width:768px){

      body{
        align-items:flex-start;
        padding:14px;
      }

      .container{
        margin-top:20px;
      }
    }

    /* MOBILE */

    @media(max-width:520px){

      body{
        padding:12px;
      }

      .container{
        padding:20px;
        border-radius:22px;
      }

      .logo{
        font-size:2.1rem;
      }

      .subtitle{
        font-size:.88rem;
        margin-bottom:24px;
      }

      .button-grid{
        grid-template-columns:1fr;
      }

      input{
        font-size:16px;
        padding:15px;
      }

      button{
        width:100%;
        font-size:.95rem;
      }

      .barcode-frame{
        padding:14px;
        border-radius:18px;
      }

      .lock-box{
        padding:22px;
      }

      .lock-title{
        font-size:1.8rem;
      }
    }

    /* SMALL PHONES */

    @media(max-width:360px){

      .container{
        padding:16px;
      }

      .logo{
        font-size:1.8rem;
      }

      input{
        padding:14px;
      }

      button{
        min-height:50px;
      }
    }

  </style>
</head>

<body>

<!-- PASSWORD SCREEN -->

<div id="lockScreen">

  <div class="lock-box">

    <div class="lock-title">
      GenBurys
    </div>

    <div class="lock-sub">
      Enter password to continue
    </div>

    <input
      type="password"
      id="passwordInput"
      placeholder="Password"
      autocomplete="off"
    />

    <button
      class="price-button"
      style="width:100%;margin-top:14px;"
      onclick="checkPassword()"
    >
      Unlock
    </button>

    <div class="error" id="errorText">
      Incorrect password
    </div>

  </div>

</div>

<!-- MAIN SITE -->

<div
  class="container"
  id="mainSite"
  style="display:none;"
>

  <div class="logo">
    GenBurys
  </div>

  <div class="subtitle">
    Matte Edition Barcode Generator
  </div>

  <div class="input-group">

    <label>
      Product Barcode
    </label>

    <input
      type="text"
      id="productCode"
      inputmode="numeric"
      placeholder="Enter 13-digit barcode"
      maxlength="13"
      oninput="this.value=this.value.replace(/\D/g,'').slice(0,13)"
    />

  </div>

  <div class="button-grid">

    <button
      class="price-button"
      onclick="setPriceAndGenerate(10)"
    >
      10p
    </button>

    <button
      class="price-button"
      onclick="setPriceAndGenerate(49)"
    >
      49p
    </button>

    <button
      class="price-button"
      onclick="setPriceAndGenerate(100)"
    >
      £1
    </button>

    <button
      class="price-button"
      onclick="showCustomPrice()"
    >
      Custom
    </button>

  </div>

  <div id="customPriceContainer">

    <div
      class="input-group"
      style="margin-top:15px;"
    >

      <label>
        Custom Price
      </label>

      <input
        type="number"
        inputmode="numeric"
        id="price"
        placeholder="Enter price in pence"
        min="1"
        max="9999"
      />

    </div>

    <button
      class="secondary-btn"
      onclick="generateBarcode()"
    >
      Generate Barcode
    </button>

  </div>

  <div class="barcode-frame">

    <canvas
      id="barcodeCanvas"
      width="400"
      height="150"
    ></canvas>

    <div class="watermark">
      GenBurys Matte UI
    </div>

  </div>

  <div class="toggle-wrap">

    <button
      class="dark-mode-toggle"
      onclick="toggleDarkMode()"
    >
      Toggle Theme
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>

<script>

const SITE_PASSWORD = ".gg/star";

function checkPassword(){

  const input =
    document.getElementById("passwordInput").value;

  if(input === SITE_PASSWORD){

    document.getElementById("lockScreen").style.animation =
      "fadeIn .4s ease reverse";

    setTimeout(() => {

      document.getElementById("lockScreen").style.display =
        "none";

      document.getElementById("mainSite").style.display =
        "block";

    }, 350);

  } else {

    document.getElementById("errorText").style.display =
      "block";
  }
}

document
.getElementById("passwordInput")
.addEventListener("keypress", function(e){

  if(e.key === "Enter"){
    checkPassword();
  }
});

function padLeft(str, length) {
  return str.toString().padStart(length, '0');
}

function calculateCheckDigit(input) {

  let sum = 0;

  for (let i = 0; i < input.length; i++) {

    const digit =
      parseInt(input[input.length - 1 - i], 10);

    const weight =
      (i % 2 === 0) ? 3 : 1;

    sum += digit * weight;
  }

  let checkDigit =
    (10 - (sum % 10)) % 10;

  return checkDigit;
}

function generateBarcode() {

  const productInput =
    document.getElementById('productCode').value;

  const priceInput =
    document.getElementById('price').value;

  if (!productInput || productInput.length < 8) {

    alert("Enter a valid barcode (at least 8 digits).");
    return;
  }

  const numericProduct =
    productInput.replace(/\D/g, '');

  let productDigits =
    numericProduct.length === 14
    ? numericProduct.slice(0, -1)
    : numericProduct;

  productDigits =
    padLeft(productDigits, 13);

  const paddedPrice =
    padLeft(priceInput, 6);

  const baseNumber =
    `91${productDigits}${paddedPrice}`;

  const checkDigit =
    calculateCheckDigit(baseNumber);

  const fullBarcode =
    `${baseNumber}${checkDigit}`;

  const canvas =
    document.getElementById("barcodeCanvas");

  canvas.style.opacity = "0";

  setTimeout(() => {

    JsBarcode(canvas, fullBarcode, {
      format: "CODE128",
      displayValue: true,
      fontSize: 16,
      width: window.innerWidth < 500 ? 1.5 : 2,
      height: 80,
      margin: 5
    });

    canvas.style.transition = ".4s";
    canvas.style.opacity = "1";

  }, 180);
}

function setPriceAndGenerate(pence) {

  document.getElementById('price').value =
    pence;

  document.getElementById('customPriceContainer').style.display =
    'none';

  generateBarcode();
}

function showCustomPrice() {

  document.getElementById('customPriceContainer').style.display =
    'block';
}

function toggleDarkMode() {

  document.body.classList.toggle("light-mode");
}

</script>

</body>
</html>
